<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Portal | CR8 Autos</title>
<meta name="description" content="CR8 Autos admin portal."/>
<meta name="keywords" content=""/>
<link rel="canonical" href="https://cr8autos.com/admin.html"/>
<meta property="og:title" content="Admin Portal | CR8 Autos"/>
<meta property="og:description" content="CR8 Autos admin portal."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://cr8autos.com/admin.html"/>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root {
  --black: #0a0a0a;
  --dark: #111111;
  --card: #161616;
  --border: #222222;
  --red: #cc1f1f;
  --red-light: #e83333;
  --red-dark: #9a1515;
  --white: #f5f5f5;
  --gray: #888888;
  --light-gray: #cccccc;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Crimson Pro',serif;background:var(--black);color:var(--white);overflow-x:hidden;}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--red);}

/* ===== NAVBAR ===== */
.navbar{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:1rem 3rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(204,31,31,0.2);transition:all 0.3s;}
.navbar.scrolled{padding:0.7rem 3rem;border-bottom-color:rgba(204,31,31,0.4);}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;cursor:pointer;}
.logo-circle{width:48px;height:48px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:white;letter-spacing:1px;flex-shrink:0;position:relative;overflow:hidden;}
.logo-circle::before{content:'';position:absolute;inset:2px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);}
.logo-text{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.2rem;letter-spacing:2px;text-transform:uppercase;color:var(--white);}
.logo-text span{color:var(--red);}
.nav-links{display:flex;gap:2.5rem;list-style:none;align-items:center;}
.nav-links a{color:var(--light-gray);text-decoration:none;font-family:'Oswald',sans-serif;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;font-weight:400;transition:color 0.3s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--red);transition:width 0.3s;}
.nav-links a:hover{color:var(--white);}
.nav-links a:hover::after{width:100%;}
.nav-cta{background:var(--red)!important;color:white!important;padding:0.5rem 1.5rem;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:2px;font-size:0.8rem;border:none;cursor:pointer;text-transform:uppercase;transition:all 0.3s;text-decoration:none;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);}
.nav-cta:hover{background:var(--red-light)!important;transform:translateY(-2px);}
.nav-cta::after{display:none!important;}
.menu-btn{display:none;background:none;border:none;color:var(--white);font-size:1.4rem;cursor:pointer;}

/* ===== PAGES ===== */
.page{display:none;min-height:100vh;}
.page.active{display:block;}

/* ===== HERO ===== */
.hero{min-height:100vh;position:relative;display:flex;align-items:center;overflow:hidden;background:var(--black);}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(204,31,31,0.08) 0%,transparent 50%),linear-gradient(225deg,rgba(204,31,31,0.04) 0%,transparent 60%);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(204,31,31,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(204,31,31,0.06) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse at 30% 50%,black 20%,transparent 70%);}
.hero-stripe{position:absolute;top:0;right:0;width:45%;height:100%;background:linear-gradient(180deg,var(--dark) 0%,#0d0d0d 100%);clip-path:polygon(15% 0,100% 0,100% 100%,0 100%);}
.hero-stripe::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,transparent,var(--red),transparent);}
.hero-inner{max-width:900px;margin:0 auto;padding:0 3rem;width:100%;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:1;padding-top:80px;}
.hero-tag{display:inline-flex;align-items:center;gap:10px;margin-bottom:1.5rem;justify-content:center;}
.hero-tag span{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--red);}
.hero-tag::before{content:'';width:40px;height:1px;background:var(--red);}
.hero-title{font-family:'Oswald',sans-serif;font-size:clamp(3.5rem,6vw,5.5rem);font-weight:700;line-height:0.95;text-transform:uppercase;letter-spacing:1px;margin-bottom:1.5rem;}
.hero-title .line2{color:var(--red);display:block;}
.hero-title .line3{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:300;color:var(--gray);letter-spacing:4px;display:block;margin-top:0.5rem;}
.hero-sub{font-size:1.15rem;color:var(--gray);line-height:1.8;max-width:600px;margin-bottom:2.5rem;font-style:italic;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:3rem;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:0.9rem 2rem;font-family:'Oswald',sans-serif;font-weight:500;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;text-decoration:none;transition:all 0.3s;}
.btn-red{background:var(--red);color:white;clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);}
.btn-red:hover{background:var(--red-light);transform:translateY(-3px);}
.btn-outline{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.2);clip-path:polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);}
.btn-outline:hover{border-color:var(--red);color:var(--red);}
.hero-stats{display:flex;gap:2.5rem;justify-content:center;}
.hero-stat-num{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;color:var(--red);}
.hero-stat-label{font-size:0.85rem;color:var(--gray);letter-spacing:1px;}
.hero-visual{position:relative;display:flex;align-items:center;justify-content:center;}
.hero-logo-big{width:320px;height:320px;background:radial-gradient(circle,rgba(204,31,31,0.15) 0%,transparent 70%);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
.hero-logo-big::before{content:'';position:absolute;inset:20px;border-radius:50%;border:1px solid rgba(204,31,31,0.2);animation:rotateBorder 20s linear infinite;}
.hero-logo-big::after{content:'';position:absolute;inset:40px;border-radius:50%;border:1px dashed rgba(204,31,31,0.1);animation:rotateBorder 15s linear infinite reverse;}
@keyframes rotateBorder{to{transform:rotate(360deg);}}
.logo-center{text-align:center;}
.logo-car{font-size:4rem;margin-bottom:0.5rem;filter:drop-shadow(0 0 20px rgba(204,31,31,0.5));}
.logo-brand{font-family:'Oswald',sans-serif;font-weight:700;font-size:2.5rem;letter-spacing:4px;text-transform:uppercase;}
.logo-brand span{color:var(--red);}
.logo-tagline{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:4px;color:var(--gray);text-transform:uppercase;margin-top:0.3rem;}
.hero-address{display:flex;align-items:center;gap:10px;color:var(--gray);font-size:0.9rem;margin-top:2rem;justify-content:center;}
.hero-address i{color:var(--red);}

/* ===== SECTION COMMONS ===== */
.section{padding:100px 3rem;}
.section-inner{max-width:1300px;margin:0 auto;}
.section-tag{display:inline-flex;align-items:center;gap:10px;margin-bottom:1rem;}
.section-tag span{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--red);}
.section-tag::before{content:'';width:30px;height:1px;background:var(--red);}
.section-title{font-family:'Oswald',sans-serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:700;text-transform:uppercase;letter-spacing:1px;line-height:1;}
.section-sub{color:var(--gray);font-size:1.1rem;line-height:1.8;margin-top:0.8rem;max-width:600px;font-style:italic;}

/* ===== SERVICES ===== */
.services{background:var(--dark);}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;margin-top:4rem;background:var(--border);}
.service-card{background:var(--dark);padding:2.5rem;transition:all 0.3s;position:relative;overflow:hidden;cursor:default;}
.service-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:var(--red);transition:height 0.4s;}
.service-card:hover{background:var(--card);}
.service-card:hover::before{height:100%;}
.service-num{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--red);letter-spacing:2px;margin-bottom:1rem;opacity:0.6;}
.service-icon{font-size:2rem;margin-bottom:1rem;color:var(--red);}
.service-name{font-family:'Oswald',sans-serif;font-weight:600;font-size:1.2rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:0.8rem;}
.service-desc{color:var(--gray);font-size:0.95rem;line-height:1.7;}

/* ===== ESTIMATE SECTION ===== */
.estimate-section{background:var(--black);position:relative;overflow:hidden;}
.estimate-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);}
.estimate-inner{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center;}
.estimate-text h2{font-family:'Oswald',sans-serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:700;text-transform:uppercase;line-height:1;margin-bottom:1rem;}
.estimate-text h2 span{color:var(--red);}
.estimate-text p{color:var(--gray);line-height:1.8;font-size:1.1rem;font-style:italic;margin-bottom:2rem;}
.contact-info{margin-top:2rem;}
.contact-row{display:flex;align-items:center;gap:14px;padding:1rem 0;border-bottom:1px solid var(--border);}
.contact-row:last-child{border-bottom:none;}
.contact-icon{width:40px;height:40px;background:rgba(204,31,31,0.1);border:1px solid rgba(204,31,31,0.2);display:flex;align-items:center;justify-content:center;color:var(--red);font-size:0.9rem;flex-shrink:0;}
.contact-label{font-family:'Oswald',sans-serif;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:2px;}
.contact-val{color:var(--white);font-size:1rem;}
.contact-val a{color:var(--white);text-decoration:none;}
.contact-val a:hover{color:var(--red);}

/* ===== FORM CARD ===== */
.form-card{background:var(--card);border:1px solid var(--border);padding:2.5rem;position:relative;}
.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--red-dark));}
.form-title{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.form-group{margin-bottom:1.2rem;}
.form-label{display:block;font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:0.5rem;}
.form-input,.form-select,.form-textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--white);font-family:'Crimson Pro',serif;font-size:1rem;padding:0.8rem 1rem;outline:none;transition:border-color 0.3s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--red);}
.form-input::placeholder,.form-textarea::placeholder{color:rgba(255,255,255,0.2);}
.form-select option{background:var(--dark);}
.form-textarea{resize:vertical;min-height:120px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-success{display:none;text-align:center;padding:2rem;color:var(--red);}
.form-success i{font-size:2.5rem;display:block;margin-bottom:0.8rem;}
.form-success p{color:var(--light-gray);font-size:1.1rem;}

/* ===== WHY US PAGE ===== */
.why-hero{padding:140px 3rem 80px;background:var(--dark);position:relative;overflow:hidden;}
.why-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);}
.why-hero-inner{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
.mission-block{background:var(--black);border:1px solid var(--border);padding:3rem;position:relative;}
.mission-block::before{content:'"';position:absolute;top:-20px;left:20px;font-family:'Oswald',sans-serif;font-size:6rem;color:var(--red);opacity:0.3;line-height:1;}
.mission-text{font-size:1.3rem;line-height:1.8;color:var(--light-gray);font-style:italic;}
.values-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:4rem;}
.value-card{background:var(--card);border:1px solid var(--border);padding:2rem;position:relative;overflow:hidden;transition:all 0.3s;}
.value-card:hover{border-color:rgba(204,31,31,0.4);transform:translateY(-4px);}
.value-icon{font-size:1.8rem;color:var(--red);margin-bottom:1rem;}
.value-name{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:0.5rem;}
.value-desc{color:var(--gray);font-size:0.95rem;line-height:1.6;}
.story-section{padding:100px 3rem;background:var(--black);}
.story-inner{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1fr 1.2fr;gap:6rem;align-items:start;}
.story-visual{position:sticky;top:120px;}
.story-img-placeholder{background:var(--card);border:1px solid var(--border);aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.story-img-placeholder::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(204,31,31,0.1),transparent);}
.story-icon{font-size:5rem;opacity:0.2;}
.story-badge{position:absolute;bottom:2rem;left:2rem;right:2rem;background:rgba(10,10,10,0.9);border:1px solid var(--border);padding:1.2rem;border-left:3px solid var(--red);}
.story-badge-title{font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:0.3rem;}
.story-badge-sub{color:var(--gray);font-size:0.85rem;}
.story-content h3{font-family:'Oswald',sans-serif;font-size:2.5rem;font-weight:700;text-transform:uppercase;line-height:1;margin-bottom:2rem;}
.story-content h3 span{color:var(--red);}
.story-content p{color:var(--gray);font-size:1.1rem;line-height:1.9;margin-bottom:1.5rem;font-style:italic;}

/* ===== CAREERS PAGE ===== */
.careers-hero{padding:140px 3rem 80px;background:var(--dark);position:relative;}
.jobs-section{padding:80px 3rem;background:var(--black);}
.jobs-inner{max-width:1300px;margin:0 auto;}
.job-card{background:var(--card);border:1px solid var(--border);padding:2.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;transition:all 0.3s;cursor:pointer;}
.job-card:hover{border-color:rgba(204,31,31,0.4);background:#1a1a1a;}
.job-type{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border:1px solid;margin-bottom:0.8rem;}
.job-type.full{color:var(--red);border-color:rgba(204,31,31,0.4);}
.job-type.part{color:#888;border-color:#333;}
.job-title{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;}
.job-location{color:var(--gray);font-size:0.95rem;display:flex;align-items:center;gap:6px;}
.job-location i{color:var(--red);}
.job-perks{display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;}
.perk{background:rgba(204,31,31,0.08);border:1px solid rgba(204,31,31,0.15);color:var(--light-gray);padding:4px 12px;font-size:0.8rem;font-family:'DM Mono',monospace;letter-spacing:1px;}

/* ===== APPLICATION MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.active{opacity:1;pointer-events:all;}
.modal{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--red);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform 0.3s;scrollbar-width:thin;scrollbar-color:var(--red) transparent;}
.modal-overlay.active .modal{transform:translateY(0);}
.modal-header{padding:2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:start;position:sticky;top:0;background:var(--card);z-index:1;}
.modal-close{background:none;border:1px solid var(--border);color:var(--gray);width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:1rem;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:2rem;}
.radio-group{display:flex;gap:0.8rem;flex-wrap:wrap;}
.radio-opt{flex:1;min-width:120px;}
.radio-opt input{display:none;}
.radio-opt label{display:block;padding:0.7rem;border:1px solid var(--border);text-align:center;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;color:var(--gray);transition:all 0.2s;}
.radio-opt input:checked+label{border-color:var(--red);color:var(--red);background:rgba(204,31,31,0.08);}

/* ===== ADMIN ===== */
.admin-page{padding:100px 3rem 60px;background:var(--black);min-height:100vh;}
.admin-inner{max-width:1300px;margin:0 auto;}
.admin-login-card{max-width:420px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-top:3px solid var(--red);padding:3rem;}
.admin-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid var(--border);}
.admin-tab{padding:1rem 2rem;font-family:'Oswald',sans-serif;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all 0.2s;}
.admin-tab.active{color:var(--red);border-bottom-color:var(--red);}
.admin-tab-content{display:none;}
.admin-tab-content.active{display:block;}
.admin-table{width:100%;border-collapse:collapse;font-size:0.9rem;}
.admin-table th{text-align:left;padding:0.8rem 1rem;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--red);}
.admin-table td{padding:1rem;border-bottom:1px solid rgba(255,255,255,0.05);color:var(--light-gray);vertical-align:top;}
.admin-table tr:hover td{background:rgba(255,255,255,0.02);}
.badge{display:inline-block;padding:2px 8px;font-size:0.7rem;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
.badge-red{background:rgba(204,31,31,0.15);color:var(--red);border:1px solid rgba(204,31,31,0.3);}
.badge-gray{background:rgba(255,255,255,0.05);color:var(--gray);border:1px solid var(--border);}
.admin-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
.admin-count{font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:1px;color:var(--gray);}
.logout-btn{background:none;border:1px solid var(--border);color:var(--gray);padding:0.5rem 1rem;font-family:'Oswald',sans-serif;font-size:0.8rem;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.empty-state{text-align:center;padding:4rem;color:var(--gray);}
.empty-state i{font-size:3rem;color:var(--border);display:block;margin-bottom:1rem;}

/* ===== FOOTER ===== */
.footer{background:var(--dark);border-top:1px solid var(--border);padding:60px 3rem 30px;}
.footer-inner{max-width:1300px;margin:0 auto;}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem;}
.footer-brand p{color:var(--gray);font-size:0.95rem;line-height:1.8;margin-top:1rem;}
.footer-col-title{font-family:'Oswald',sans-serif;font-size:0.85rem;letter-spacing:3px;text-transform:uppercase;color:var(--white);margin-bottom:1.2rem;}
.footer-col ul{list-style:none;}
.footer-col ul li{margin-bottom:0.7rem;}
.footer-col ul li a{color:var(--gray);text-decoration:none;font-size:0.95rem;transition:color 0.2s;}
.footer-col ul li a:hover{color:var(--red);}
.footer-bottom{border-top:1px solid var(--border);padding-top:2rem;display:flex;justify-content:space-between;align-items:center;color:var(--gray);font-size:0.85rem;}

/* ===== ANIMATIONS ===== */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity 0.7s,transform 0.7s;}
.fade-up.visible{opacity:1;transform:none;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Red diagonal accent bars (like logo) */
.accent-bars{display:flex;gap:4px;align-items:center;}
.acc{width:12px;height:18px;background:var(--red);clip-path:polygon(20% 0,100% 0,80% 100%,0 100%);opacity:0.7;}
.acc:nth-child(2){opacity:0.5;}
.acc:nth-child(3){opacity:0.3;}

.hero-address-block{display:flex;align-items:center;gap:12px;margin-top:2rem;justify-content:center;flex-wrap:wrap;}
.hero-address-link{display:inline-flex;align-items:center;gap:10px;color:var(--white);text-decoration:none;background:rgba(204,31,31,0.12);border:1px solid rgba(204,31,31,0.35);padding:0.7rem 1.4rem;font-size:1rem;font-family:'Oswald',sans-serif;letter-spacing:1px;transition:all 0.3s;}
.hero-address-link:hover{background:rgba(204,31,31,0.22);border-color:var(--red);color:var(--white);}
.hero-address-link i:first-child{color:var(--red);font-size:1rem;}
.address-open-maps{font-size:0.75rem;color:var(--red);letter-spacing:1px;margin-left:6px;font-family:'DM Mono',monospace;text-transform:uppercase;}
.address-copy-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--light-gray);padding:0.7rem 1.2rem;font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:6px;}
.address-copy-btn:hover{border-color:var(--red);color:var(--red);}
.address-copy-btn.copied{border-color:var(--red);color:var(--red);}

/* ── Booking progress bar ── */
.book-progress{height:3px;background:rgba(255,255,255,0.08);margin-bottom:1.5rem;border-radius:2px;}
.book-progress-bar{height:100%;background:var(--red);border-radius:2px;transition:width 0.4s ease;}

/* ── Calendar nav ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cal-nav-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--white);width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.cal-nav-btn:hover{border-color:var(--red);color:var(--red);}
.cal-month-label{font-family:'Oswald',sans-serif;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;color:var(--white);}

/* ── Calendar grid ── */
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:0.4rem;}
.cal-grid-header span{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:1px;color:var(--gray);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1.2rem;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:0.85rem;cursor:pointer;border:1px solid transparent;transition:all 0.2s;border-radius:2px;color:var(--light-gray);}
.cal-day:hover:not(.cal-day-disabled):not(.cal-day-empty){border-color:var(--red);color:var(--red);}
.cal-day-today{border-color:rgba(255,255,255,0.2);color:var(--white);}
.cal-day-selected{background:var(--red);color:white!important;border-color:var(--red)!important;}
.cal-day-disabled{color:rgba(255,255,255,0.15);cursor:default;pointer-events:none;}
.cal-day-empty{cursor:default;pointer-events:none;}

/* ── Time slots ── */
.cal-time-title{font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:0.8rem;}
.cal-time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem;}
.cal-time-slot{padding:0.5rem 0.3rem;text-align:center;font-family:'DM Mono',monospace;font-size:0.8rem;border:1px solid rgba(255,255,255,0.12);color:var(--light-gray);cursor:pointer;transition:all 0.2s;background:transparent;}
.cal-time-slot:hover:not(.cal-time-booked){border-color:var(--red);color:var(--red);}
.cal-time-slot.cal-time-selected{background:var(--red);border-color:var(--red);color:white;}
.cal-time-slot.cal-time-booked{color:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.06);cursor:not-allowed;text-decoration:line-through;}

/* ── Calendar footer ── */
.cal-footer{display:flex;justify-content:space-between;align-items:center;padding-top:0.5rem;border-top:1px solid rgba(255,255,255,0.06);}
.delete-btn{background:none;border:1px solid rgba(204,31,31,0.3);color:rgba(204,31,31,0.6);padding:4px 10px;font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;margin-top:6px;display:inline-block;}
.delete-btn:hover{background:rgba(204,31,31,0.1);border-color:var(--red);color:var(--red);}

<script>
(() => {
  const supabaseUrl = 'https://llrjzyhdphitrjzbstoq.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxscmp6eWhkcGhpdHJqemJzdG9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTc1NDUsImV4cCI6MjA5MjI5MzU0NX0.3ml84Lp1AqUlwUV8xkgNwmrZ7Bdg1NYtzPq3khcXMHY';
  window.cr8SupabaseClient = window.cr8SupabaseClient || window.supabase.createClient(supabaseUrl, supabaseKey);

  const ADMIN_USER = 'cr8admin';
  const ADMIN_PASS = 'CR8Autos2025!';

  let applications = [];
  let inquiries = [];
  let bookings = [];
  let messages = [];

  async function doAdminLogin() {
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    const adminErr = document.getElementById('adminErr');

    if (u === ADMIN_USER && p === ADMIN_PASS) {
      document.getElementById('adminLoginWrap').style.display = 'none';
      document.getElementById('adminDashWrap').style.display = 'block';
      document.getElementById('adminCount').textContent = 'Loading...';
      await loadAdminData();
      renderAdmin();
    } else {
      adminErr.textContent = 'Invalid credentials.';
    }
  }

  async function loadAdminData() {
    try {
      const { data, error } = await window.cr8SupabaseClient
        .from('bookings')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) throw error;
      bookings = data || [];
    } catch (error) {
      console.error('Failed to load bookings:', error);
      bookings = [];
    }
  }

  function doAdminLogout() {
    document.getElementById('adminLoginWrap').style.display = 'block';
    document.getElementById('adminDashWrap').style.display = 'none';
  }

  function switchAdminTab(tab) {
    const tabs = ['applications', 'inquiries', 'bookings', 'messages'];
    document.querySelectorAll('.admin-tab').forEach((t, i) => {
      t.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
    const tabContent = document.getElementById('tab-' + tab);
    if (tabContent) tabContent.classList.add('active');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderAdmin() {
    const adminCount = document.getElementById('adminCount');
    if (adminCount) adminCount.textContent = bookings.length + ' total bookings';
    // keep the rest of your existing renderAdmin body here
  }

  function deleteEntry(key, index) {
    if (!confirm('Delete this entry? This cannot be undone.')) return;
    const stored = JSON.parse(localStorage.getItem('cr8_' + key) || '[]');
    const reversed = stored.slice().reverse();
    reversed.splice(index, 1);
    const fixed = reversed.reverse();
    localStorage.setItem('cr8_' + key, JSON.stringify(fixed));

    if (key === 'applications') applications = fixed;
    if (key === 'inquiries') inquiries = fixed;
    if (key === 'messages') messages = fixed;
    renderAdmin();
  }

  async function deleteBooking(id) {
    if (!confirm('Delete this booking? This cannot be undone.')) return;
    const { error } = await window.cr8SupabaseClient.from('bookings').delete().eq('id', id);
    if (error) {
      console.error('Delete failed:', error);
      alert('Failed to delete. Try again.');
      return;
    }
    await loadAdminData();
    renderAdmin();
  }

  window.doAdminLogin = doAdminLogin;
  window.doAdminLogout = doAdminLogout;
  window.switchAdminTab = switchAdminTab;
  window.deleteEntry = deleteEntry;
  window.deleteBooking = deleteBooking;

  window.addEventListener('scroll', () => {
    const navbar = document.getElementById('navbar');
    if (navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
  });

  const menuBtn = document.getElementById('menuBtn');
  if (menuBtn) {
    menuBtn.addEventListener('click', () => {
      const navLinks = document.getElementById('navLinks');
      if (navLinks) navLinks.classList.toggle('open');
    });
  }

  console.log('Admin page ready');
})();
</script>
